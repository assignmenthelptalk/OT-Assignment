<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="100%" role="img" aria-labelledby="infographic-title infographic-desc">
  <title id="infographic-title">Hierarchy of Evidence for OT Assignments — Six-Level Pyramid</title>
  <desc id="infographic-desc">A pyramid diagram showing the six levels of evidence hierarchy used in occupational therapy assignments, from systematic reviews at the top to expert opinion at the base. Includes a callout for PEDro score threshold.</desc>

  <defs>
    <linearGradient id="pyramidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A9D8F"/>
      <stop offset="40%" stop-color="#457B9D"/>
      <stop offset="100%" stop-color="#A8C8D8"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D3557"/>
      <stop offset="100%" stop-color="#457B9D"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="650" fill="#F4F9FA" rx="12"/>

  <!-- Header banner -->
  <rect x="0" y="0" width="800" height="72" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="56" width="800" height="16" fill="url(#headerGrad)"/>
  <text x="400" y="30" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Hierarchy of Evidence for OT Assignments</text>
  <text x="400" y="54" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A8D8D0">Holistic SEO Methodology — Koray Tuğberk GÜBÜR | ot-assignment-help.com</text>

  <!-- ===================== PYRAMID LEVELS ===================== -->
  <!-- The pyramid is built as stacked trapezoids, apex at top -->
  <!-- Total pyramid height approx 420px, y from 90 to 510 -->
  <!-- Each level height = 70px -->

  <!-- LEVEL 1 — Systematic Reviews & Meta-Analyses (apex, narrowest) -->
  <!-- top width: 100, bottom width: 220 -->
  <polygon points="350,95 450,95 490,160 310,160" fill="#2A9D8F" filter="url(#shadow)"/>
  <text x="400" y="118" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">LEVEL 1</text>
  <text x="400" y="133" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#E8F8F6">Systematic Reviews</text>
  <text x="400" y="147" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#C5EDE8">&amp; Meta-Analyses</text>

  <!-- LEVEL 2 — RCTs -->
  <polygon points="310,163 490,163 534,228 266,228" fill="#2D8F83" filter="url(#shadow)"/>
  <text x="400" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">LEVEL 2</text>
  <text x="400" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#E8F8F6">Randomised Controlled</text>
  <text x="400" y="214" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#C5EDE8">Trials (RCTs)</text>

  <!-- LEVEL 3 — Cohort Studies -->
  <polygon points="266,231 534,231 578,296 222,296" fill="#457B9D" filter="url(#shadow)"/>
  <text x="400" y="253" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">LEVEL 3</text>
  <text x="400" y="268" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#E4EEF5">Cohort Studies</text>
  <text x="400" y="282" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#C0D8E8">(Prospective &amp; Retrospective)</text>

  <!-- LEVEL 4 — Case-Control Studies -->
  <polygon points="222,299 578,299 622,364 178,364" fill="#3D6E8C" filter="url(#shadow)"/>
  <text x="400" y="321" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">LEVEL 4</text>
  <text x="400" y="336" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#E4EEF5">Case-Control Studies</text>
  <text x="400" y="350" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#C0D8E8">Retrospective comparison with/without outcome</text>

  <!-- LEVEL 5 — Case Series & Case Reports -->
  <polygon points="178,367 622,367 666,432 134,432" fill="#2E5F7A" filter="url(#shadow)"/>
  <text x="400" y="389" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">LEVEL 5</text>
  <text x="400" y="404" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#E4EEF5">Case Series &amp; Case Reports</text>
  <text x="400" y="418" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#B8D0DE">e.g. Single OT client intervention accounts</text>

  <!-- LEVEL 6 — Expert Opinion (base, widest) -->
  <polygon points="134,435 666,435 710,500 90,500" fill="#1D3557" filter="url(#shadow)"/>
  <text x="400" y="457" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">LEVEL 6</text>
  <text x="400" y="472" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#A8C8D8">Expert Opinion &amp; Consensus</text>
  <text x="400" y="487" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#87A9C0">RCOT/AOTA position statements, clinical guidelines without research base</text>

  <!-- ===================== SIDE LABELS ===================== -->
  <!-- Left side labels: study type context -->
  <!-- Right side labels: OT example -->

  <!-- Level 1 right label -->
  <line x1="452" y1="127" x2="530" y2="120" stroke="#2A9D8F" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="532" y="108" width="198" height="28" rx="4" fill="#FFFFFF" stroke="#2A9D8F" stroke-width="1"/>
  <text x="630" y="122" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" font-weight="600">OT ex: Cochrane review of CIMT</text>
  <text x="630" y="133" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#457B9D">post-stroke — Level 1A evidence</text>

  <!-- Level 2 right label -->
  <line x1="490" y1="195" x2="532" y2="190" stroke="#2D8F83" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="532" y="178" width="198" height="28" rx="4" fill="#FFFFFF" stroke="#2D8F83" stroke-width="1"/>
  <text x="630" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" font-weight="600">OT ex: RCT — ADL retraining post-stroke</text>
  <text x="630" y="203" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#457B9D">Outcomes: COPM, Barthel Index</text>

  <!-- Level 3 left label -->
  <line x1="268" y1="263" x2="198" y2="258" stroke="#457B9D" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="10" y="246" width="186" height="28" rx="4" fill="#FFFFFF" stroke="#457B9D" stroke-width="1"/>
  <text x="104" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" font-weight="600">OT ex: Longitudinal study of</text>
  <text x="104" y="271" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#457B9D">occupational performance in older adults</text>

  <!-- Level 4 right label -->
  <line x1="578" y1="331" x2="620" y2="326" stroke="#3D6E8C" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="622" y="314" width="168" height="28" rx="4" fill="#FFFFFF" stroke="#3D6E8C" stroke-width="1"/>
  <text x="706" y="328" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" font-weight="600">OT ex: Comparing fall rates</text>
  <text x="706" y="339" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#457B9D">in home-modified vs standard homes</text>

  <!-- Level 5 left label -->
  <line x1="178" y1="399" x2="130" y2="394" stroke="#2E5F7A" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="10" y="382" width="118" height="28" rx="4" fill="#FFFFFF" stroke="#2E5F7A" stroke-width="1"/>
  <text x="70" y="396" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" font-weight="600">OT ex: Case report</text>
  <text x="70" y="407" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#457B9D">sensory integration TBI</text>

  <!-- Level 6 right label -->
  <line x1="666" y1="467" x2="706" y2="462" stroke="#1D3557" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="707" y="450" width="83" height="28" rx="4" fill="#FFFFFF" stroke="#1D3557" stroke-width="1"/>
  <text x="749" y="464" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" font-weight="600">OT ex: RCOT</text>
  <text x="749" y="475" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#457B9D">Position Statement</text>

  <!-- ===================== PEDRO CALLOUT BOX ===================== -->
  <rect x="60" y="516" width="320" height="76" rx="8" fill="#1D3557" filter="url(#shadow)"/>
  <rect x="60" y="516" width="6" height="76" rx="4" fill="#2A9D8F"/>
  <text x="82" y="535" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#2A9D8F">PEDro Score Quality Threshold (RCTs)</text>
  <text x="82" y="552" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#FFFFFF">≥ 6 / 10  =  High quality RCT for OT assignments</text>
  <text x="82" y="567" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#A8C8D8">4 – 5 / 10  =  Moderate quality</text>
  <text x="82" y="582" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#A8C8D8">≤ 3 / 10  =  Low quality  |  11 items; scored 0–10</text>

  <!-- ===================== EVIDENCE QUALITY ARROW ===================== -->
  <!-- Vertical arrow on far left indicating "Highest Evidence" at top, "Lowest" at bottom -->
  <!-- We skip a full arrow and use text labels + small chevron -->
  <text x="30" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#2A9D8F" transform="rotate(-90,30,300)">HIGHEST EVIDENCE QUALITY</text>
  <!-- Arrow line -->
  <line x1="18" y1="140" x2="18" y2="490" stroke="#2A9D8F" stroke-width="2"/>
  <polygon points="18,95 13,115 23,115" fill="#2A9D8F"/>
  <polygon points="18,510 13,490 23,490" fill="#1D3557"/>
  <text x="30" y="440" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#1D3557" transform="rotate(-90,30,440)">LOWEST EVIDENCE QUALITY</text>

  <!-- ===================== BOTTOM NOTE ===================== -->
  <rect x="420" y="516" width="332" height="76" rx="8" fill="#FFFFFF" stroke="#457B9D" stroke-width="1"/>
  <text x="586" y="535" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#1D3557">OT Assignment Note</text>
  <text x="434" y="551" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#2C2C2C">Level 2–3 evidence is common in OT research</text>
  <text x="434" y="565" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#2C2C2C">due to ethical constraints on RCT blinding —</text>
  <text x="434" y="579" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#2C2C2C">acknowledge this limitation in your assignment.</text>

  <!-- Footer -->
  <text x="400" y="638" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#457B9D">ot-assignment-help.com  |  Evidence-Based Practice OT Assignments  |  Holistic SEO Methodology</text>
</svg>
