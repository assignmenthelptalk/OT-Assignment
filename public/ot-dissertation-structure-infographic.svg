<svg viewBox="0 0 800 650" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="infographic-title infographic-desc" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <title id="infographic-title">OT Dissertation Chapter Structure — Word Count Allocation by Chapter</title>
  <desc id="infographic-desc">A vertical flow diagram showing the seven chapters of an occupational therapy dissertation, with typical word count allocations and key content for each chapter, for BSc Level 6 and MSc Level 7 students.</desc>

  <!-- Background -->
  <rect width="800" height="650" fill="#F4F9FA" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1D3557" rx="8"/>
  <rect x="0" y="52" width="800" height="8" fill="#1D3557"/>
  <text x="400" y="22" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700" letter-spacing="0.3">OT DISSERTATION CHAPTER STRUCTURE</text>
  <text x="400" y="44" text-anchor="middle" fill="#2A9D8F" font-size="11" font-weight="500">Word Count Allocation — BSc Level 6 (10,000 words) &amp; MSc Level 7 (20,000 words)</text>

  <!-- ===== CHAPTER 1 — INTRODUCTION ===== -->
  <!-- Bar -->
  <rect x="30" y="75" width="740" height="60" fill="#1D3557" rx="6"/>
  <!-- Chapter label -->
  <text x="50" y="98" fill="#FFFFFF" font-size="12" font-weight="700">Chapter 1</text>
  <text x="50" y="114" fill="#2A9D8F" font-size="10" font-weight="600">INTRODUCTION</text>
  <!-- Word counts -->
  <text x="230" y="98" fill="#FFFFFF" font-size="10.5" font-weight="600">BSc: 800–1,000 words (8–10%)</text>
  <text x="230" y="114" fill="#FFFFFF" font-size="10.5" font-weight="600">MSc: 1,500–2,000 words (8–10%)</text>
  <!-- Key content -->
  <text x="490" y="93" fill="#F4F9FA" font-size="9.5">Background · Research significance · Aim (1 sentence)</text>
  <text x="490" y="107" fill="#F4F9FA" font-size="9.5">Objectives (3–5 numbered) · Dissertation overview</text>
  <text x="490" y="121" fill="#F4F9FA" font-size="9.5">Central Entity: OT research question established</text>

  <!-- Arrow 1→2 -->
  <line x1="400" y1="135" x2="400" y2="148" stroke="#457B9D" stroke-width="2.5"/>
  <polygon points="393,148 407,148 400,157" fill="#457B9D"/>

  <!-- ===== CHAPTER 2 — LITERATURE REVIEW ===== -->
  <rect x="30" y="160" width="740" height="60" fill="#2A9D8F" rx="6"/>
  <text x="50" y="183" fill="#FFFFFF" font-size="12" font-weight="700">Chapter 2</text>
  <text x="50" y="199" fill="#1D3557" font-size="10" font-weight="700">LITERATURE REVIEW</text>
  <text x="230" y="183" fill="#FFFFFF" font-size="10.5" font-weight="600">BSc: 2,500–3,500 words (25–35%)</text>
  <text x="230" y="199" fill="#FFFFFF" font-size="10.5" font-weight="600">MSc: 5,000–7,000 words (25–35%)</text>
  <text x="490" y="178" fill="#1D3557" font-size="9.5">Critical appraisal (CASP/PEDro) · Synthesis not summary</text>
  <text x="490" y="192" fill="#1D3557" font-size="9.5">PRISMA flow diagram (systematic) · PICO if systematic</text>
  <text x="490" y="206" fill="#1D3557" font-size="9.5">Thematic narrative (narrative review)</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="220" x2="400" y2="233" stroke="#457B9D" stroke-width="2.5"/>
  <polygon points="393,233 407,233 400,242" fill="#457B9D"/>

  <!-- ===== CHAPTER 3 — METHODOLOGY ===== -->
  <rect x="30" y="245" width="740" height="60" fill="#1D3557" rx="6"/>
  <text x="50" y="268" fill="#FFFFFF" font-size="12" font-weight="700">Chapter 3</text>
  <text x="50" y="284" fill="#2A9D8F" font-size="10" font-weight="600">METHODOLOGY</text>
  <text x="230" y="268" fill="#FFFFFF" font-size="10.5" font-weight="600">BSc: 2,000–2,500 words (20–25%)</text>
  <text x="230" y="284" fill="#FFFFFF" font-size="10.5" font-weight="600">MSc: 4,000–5,000 words (20–25%)</text>
  <text x="490" y="263" fill="#F4F9FA" font-size="9.5">Paradigm stated (positivist/interpretivist/pragmatist)</text>
  <text x="490" y="277" fill="#F4F9FA" font-size="9.5">Methodology named &amp; justified · Sampling strategy</text>
  <text x="490" y="291" fill="#F4F9FA" font-size="9.5">Data collection tool · Analysis method · Reflexivity (qual)</text>

  <!-- Arrow 3→4 -->
  <line x1="400" y1="305" x2="400" y2="318" stroke="#457B9D" stroke-width="2.5"/>
  <polygon points="393,318 407,318 400,327" fill="#457B9D"/>

  <!-- ===== CHAPTER 4 — ETHICS ===== -->
  <rect x="30" y="330" width="740" height="60" fill="#2A9D8F" rx="6"/>
  <text x="50" y="353" fill="#FFFFFF" font-size="12" font-weight="700">Chapter 4</text>
  <text x="50" y="369" fill="#1D3557" font-size="10" font-weight="700">ETHICS</text>
  <text x="230" y="353" fill="#FFFFFF" font-size="10.5" font-weight="600">BSc: 500–800 words (5–8%)</text>
  <text x="230" y="369" fill="#FFFFFF" font-size="10.5" font-weight="600">MSc: 1,000–1,500 words (5–8%)</text>
  <text x="490" y="348" fill="#1D3557" font-size="9.5">Beneficence · Non-maleficence · Autonomy · Justice</text>
  <text x="490" y="362" fill="#1D3557" font-size="9.5">Ethics approval obtained (university / NHS REC)</text>
  <text x="490" y="376" fill="#1D3557" font-size="9.5">Informed consent · Data storage · Anonymisation · GDPR</text>

  <!-- Arrow 4→5 -->
  <line x1="400" y1="390" x2="400" y2="403" stroke="#457B9D" stroke-width="2.5"/>
  <polygon points="393,403 407,403 400,412" fill="#457B9D"/>

  <!-- ===== CHAPTER 5 — FINDINGS / RESULTS ===== -->
  <rect x="30" y="415" width="740" height="60" fill="#1D3557" rx="6"/>
  <text x="50" y="438" fill="#FFFFFF" font-size="12" font-weight="700">Chapter 5</text>
  <text x="50" y="454" fill="#2A9D8F" font-size="10" font-weight="600">FINDINGS / RESULTS</text>
  <text x="230" y="438" fill="#FFFFFF" font-size="10.5" font-weight="600">BSc: 1,500–2,000 words (15–20%)</text>
  <text x="230" y="454" fill="#FFFFFF" font-size="10.5" font-weight="600">MSc: 4,000–5,000 words (20–25%)</text>
  <text x="490" y="433" fill="#F4F9FA" font-size="9.5">Qualitative: thematic presentation with participant quotes</text>
  <text x="490" y="447" fill="#F4F9FA" font-size="9.5">Quantitative: statistical results, tables, confidence intervals</text>
  <text x="490" y="461" fill="#F4F9FA" font-size="9.5">COREQ item 29: quotes linked to named themes</text>

  <!-- Arrow 5→6 -->
  <line x1="400" y1="475" x2="400" y2="488" stroke="#457B9D" stroke-width="2.5"/>
  <polygon points="393,488 407,488 400,497" fill="#457B9D"/>

  <!-- ===== CHAPTER 6 — DISCUSSION ===== -->
  <rect x="30" y="500" width="740" height="60" fill="#2A9D8F" rx="6"/>
  <text x="50" y="523" fill="#FFFFFF" font-size="12" font-weight="700">Chapter 6</text>
  <text x="50" y="539" fill="#1D3557" font-size="10" font-weight="700">DISCUSSION</text>
  <text x="230" y="523" fill="#FFFFFF" font-size="10.5" font-weight="600">BSc: 2,000–2,500 words (20–25%)</text>
  <text x="230" y="539" fill="#FFFFFF" font-size="10.5" font-weight="600">MSc: 4,000–5,000 words (20–25%)</text>
  <text x="490" y="518" fill="#1D3557" font-size="9.5">Findings interpreted against existing literature</text>
  <text x="490" y="532" fill="#1D3557" font-size="9.5">Critical analysis · Limitations acknowledged</text>
  <text x="490" y="546" fill="#1D3557" font-size="9.5">Implications for OT practice · Future research directions</text>

  <!-- Arrow 6→7 -->
  <line x1="400" y1="560" x2="400" y2="573" stroke="#457B9D" stroke-width="2.5"/>
  <polygon points="393,573 407,573 400,582" fill="#457B9D"/>

  <!-- ===== CHAPTER 7 — CONCLUSION ===== -->
  <rect x="30" y="585" width="740" height="46" fill="#457B9D" rx="6"/>
  <text x="50" y="606" fill="#FFFFFF" font-size="12" font-weight="700">Chapter 7</text>
  <text x="50" y="622" fill="#F4F9FA" font-size="10" font-weight="600">CONCLUSION + REFERENCES + APPENDICES</text>
  <text x="330" y="606" fill="#FFFFFF" font-size="10.5" font-weight="600">BSc: 400–600 words (3–5%)</text>
  <text x="330" y="622" fill="#FFFFFF" font-size="10.5" font-weight="600">MSc: 800–1,200 words (3–5%)</text>
  <text x="555" y="606" fill="#F4F9FA" font-size="9.5">Answers research aim · PRISMA/COREQ checklist in appendix</text>
  <text x="555" y="622" fill="#F4F9FA" font-size="9.5">Recommendations for future research</text>

  <!-- Footer -->
  <text x="400" y="643" text-anchor="middle" fill="#457B9D" font-size="9" font-style="italic">ot-assignment-help.com — Holistic SEO Methodology</text>
</svg>
