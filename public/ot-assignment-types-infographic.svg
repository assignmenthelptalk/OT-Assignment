<svg viewBox="0 0 800 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="infographic-title">
  <title id="infographic-title">Occupational Therapy Assignment Types by Qualification Level — BSc to MSc</title>

  <!-- Background -->
  <rect width="800" height="600" fill="#F4F9FA" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="72" fill="#1D3557" rx="12"/>
  <rect x="0" y="60" width="800" height="12" fill="#1D3557"/>

  <!-- Header text -->
  <text x="400" y="28" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">OT ASSIGNMENT TYPES — STRUCTURAL REQUIREMENTS &amp; WORD COUNTS</text>
  <text x="400" y="52" font-family="Inter, Arial, sans-serif" font-size="12" fill="#2A9D8F" text-anchor="middle" letter-spacing="0.5">BSc Level 4–6 · MSc Level 7 · OTD · HCPC-Aligned</text>

  <!-- === CARD 1: Case Study === -->
  <rect x="24" y="88" width="226" height="210" fill="#FFFFFF" rx="10" stroke="#2A9D8F" stroke-width="2"/>
  <!-- Card header -->
  <rect x="24" y="88" width="226" height="38" fill="#2A9D8F" rx="10"/>
  <rect x="24" y="110" width="226" height="16" fill="#2A9D8F"/>
  <text x="137" y="112" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">CASE STUDY</text>
  <!-- Word count badge -->
  <rect x="80" y="134" width="114" height="22" fill="#1D3557" rx="11"/>
  <text x="137" y="149" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">2,000 – 5,000 words</text>
  <!-- Level tag -->
  <text x="137" y="173" font-family="Inter, Arial, sans-serif" font-size="10" fill="#457B9D" text-anchor="middle" font-weight="600">BSc Level 5–6 · MSc Level 7</text>
  <!-- Divider -->
  <line x1="40" y1="182" x2="234" y2="182" stroke="#F4F9FA" stroke-width="1.5"/>
  <!-- Requirements list -->
  <circle cx="44" cy="196" r="3" fill="#2A9D8F"/>
  <text x="54" y="200" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Occupational profile</text>
  <circle cx="44" cy="214" r="3" fill="#2A9D8F"/>
  <text x="54" y="218" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Standardised assessment (COPM, AMPS)</text>
  <circle cx="44" cy="232" r="3" fill="#2A9D8F"/>
  <text x="54" y="236" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Clinical reasoning narrative</text>
  <circle cx="44" cy="250" r="3" fill="#2A9D8F"/>
  <text x="54" y="254" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">SMART goals + intervention plan</text>
  <!-- Marking focus -->
  <rect x="32" y="268" width="210" height="22" fill="#F4F9FA" rx="5"/>
  <text x="137" y="283" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" text-anchor="middle" font-weight="600">Primary marking: Clinical reasoning 25–35%</text>

  <!-- === CARD 2: Reflective Essay === -->
  <rect x="262" y="88" width="226" height="210" fill="#FFFFFF" rx="10" stroke="#457B9D" stroke-width="2"/>
  <rect x="262" y="88" width="226" height="38" fill="#457B9D" rx="10"/>
  <rect x="262" y="110" width="226" height="16" fill="#457B9D"/>
  <text x="375" y="112" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">REFLECTIVE ESSAY</text>
  <rect x="318" y="134" width="114" height="22" fill="#1D3557" rx="11"/>
  <text x="375" y="149" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">1,000 – 3,000 words</text>
  <text x="375" y="173" font-family="Inter, Arial, sans-serif" font-size="10" fill="#457B9D" text-anchor="middle" font-weight="600">BSc Level 4–6 · Placement Journals</text>
  <line x1="278" y1="182" x2="472" y2="182" stroke="#F4F9FA" stroke-width="1.5"/>
  <circle cx="282" cy="196" r="3" fill="#457B9D"/>
  <text x="292" y="200" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Gibbs / Schon / Johns model</text>
  <circle cx="282" cy="214" r="3" fill="#457B9D"/>
  <text x="292" y="218" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">HCPC Standards of Proficiency refs</text>
  <circle cx="282" cy="232" r="3" fill="#457B9D"/>
  <text x="292" y="236" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Placement scenario + critical analysis</text>
  <circle cx="282" cy="250" r="3" fill="#457B9D"/>
  <text x="292" y="254" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Critical self-reflection (not descriptive)</text>
  <rect x="270" y="268" width="210" height="22" fill="#F4F9FA" rx="5"/>
  <text x="375" y="283" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" text-anchor="middle" font-weight="600">Primary marking: Professional standards 15–20%</text>

  <!-- === CARD 3: Literature Review === -->
  <rect x="500" y="88" width="276" height="210" fill="#FFFFFF" rx="10" stroke="#1D3557" stroke-width="2"/>
  <rect x="500" y="88" width="276" height="38" fill="#1D3557" rx="10"/>
  <rect x="500" y="110" width="276" height="16" fill="#1D3557"/>
  <text x="638" y="112" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">LITERATURE REVIEW</text>
  <rect x="581" y="134" width="114" height="22" fill="#2A9D8F" rx="11"/>
  <text x="638" y="149" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">2,500 – 8,000 words</text>
  <text x="638" y="173" font-family="Inter, Arial, sans-serif" font-size="10" fill="#457B9D" text-anchor="middle" font-weight="600">BSc Level 6 · MSc Level 7 · PRISMA required</text>
  <line x1="516" y1="182" x2="760" y2="182" stroke="#F4F9FA" stroke-width="1.5"/>
  <circle cx="520" cy="196" r="3" fill="#1D3557"/>
  <text x="530" y="200" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">PICO research question</text>
  <circle cx="520" cy="214" r="3" fill="#1D3557"/>
  <text x="530" y="218" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Database search log (CINAHL, OTseeker)</text>
  <circle cx="520" cy="232" r="3" fill="#1D3557"/>
  <text x="530" y="236" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Quality appraisal: CASP / PEDro scores</text>
  <circle cx="520" cy="250" r="3" fill="#1D3557"/>
  <text x="530" y="254" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Synthesis (not summary)</text>
  <rect x="508" y="268" width="260" height="22" fill="#F4F9FA" rx="5"/>
  <text x="638" y="283" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" text-anchor="middle" font-weight="600">Primary marking: Evidence integration 20–25%</text>

  <!-- === CARD 4: Activity Analysis === -->
  <rect x="24" y="314" width="370" height="210" fill="#FFFFFF" rx="10" stroke="#2A9D8F" stroke-width="2"/>
  <rect x="24" y="314" width="370" height="38" fill="#2A9D8F" rx="10"/>
  <rect x="24" y="336" width="370" height="16" fill="#2A9D8F"/>
  <text x="209" y="338" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">ACTIVITY ANALYSIS</text>
  <rect x="152" y="360" width="114" height="22" fill="#1D3557" rx="11"/>
  <text x="209" y="375" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">1,500 – 3,000 words</text>
  <text x="209" y="399" font-family="Inter, Arial, sans-serif" font-size="10" fill="#457B9D" text-anchor="middle" font-weight="600">BSc Level 4–5 · OTPF 4th Ed. · All 8 demand categories</text>
  <line x1="40" y1="408" x2="378" y2="408" stroke="#F4F9FA" stroke-width="1.5"/>
  <!-- Two-column requirements -->
  <circle cx="44" cy="422" r="3" fill="#2A9D8F"/>
  <text x="54" y="426" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Objects and properties</text>
  <circle cx="200" cy="422" r="3" fill="#2A9D8F"/>
  <text x="210" y="426" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Space demands</text>
  <circle cx="44" cy="440" r="3" fill="#2A9D8F"/>
  <text x="54" y="444" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Social demands</text>
  <circle cx="200" cy="440" r="3" fill="#2A9D8F"/>
  <text x="210" y="444" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Sequencing and timing</text>
  <circle cx="44" cy="458" r="3" fill="#2A9D8F"/>
  <text x="54" y="462" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Required actions and skills</text>
  <circle cx="200" cy="458" r="3" fill="#2A9D8F"/>
  <text x="210" y="462" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Required body functions</text>
  <circle cx="44" cy="476" r="3" fill="#2A9D8F"/>
  <text x="54" y="480" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Required body structures</text>
  <circle cx="200" cy="476" r="3" fill="#2A9D8F"/>
  <text x="210" y="480" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Grading + adaptation recs</text>
  <rect x="32" y="494" width="354" height="22" fill="#F4F9FA" rx="5"/>
  <text x="209" y="509" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" text-anchor="middle" font-weight="600">Primary marking: Theoretical application 20–30% · All 8 OTPF demand areas required</text>

  <!-- === CARD 5: Research Proposal / Dissertation === -->
  <rect x="406" y="314" width="370" height="210" fill="#FFFFFF" rx="10" stroke="#1D3557" stroke-width="2"/>
  <rect x="406" y="314" width="370" height="38" fill="#1D3557" rx="10"/>
  <rect x="406" y="336" width="370" height="16" fill="#1D3557"/>
  <text x="591" y="338" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">RESEARCH PROPOSAL / DISSERTATION</text>
  <rect x="534" y="360" width="114" height="22" fill="#2A9D8F" rx="11"/>
  <text x="591" y="375" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">5,000 – 25,000 words</text>
  <text x="591" y="399" font-family="Inter, Arial, sans-serif" font-size="10" fill="#457B9D" text-anchor="middle" font-weight="600">BSc Level 6 · MSc Level 7 · OTD Capstone</text>
  <line x1="422" y1="408" x2="760" y2="408" stroke="#F4F9FA" stroke-width="1.5"/>
  <circle cx="426" cy="422" r="3" fill="#1D3557"/>
  <text x="436" y="426" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Aims, objectives and methodology</text>
  <circle cx="598" cy="422" r="3" fill="#1D3557"/>
  <text x="608" y="426" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Ethics application (Uni / NHS REC)</text>
  <circle cx="426" cy="440" r="3" fill="#1D3557"/>
  <text x="436" y="444" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Qualitative: IPA / phenomenology / GT</text>
  <circle cx="598" cy="440" r="3" fill="#1D3557"/>
  <text x="608" y="444" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Quantitative: RCT / cohort / cross-sec.</text>
  <circle cx="426" cy="458" r="3" fill="#1D3557"/>
  <text x="436" y="462" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">PRISMA (systematic review)</text>
  <circle cx="598" cy="458" r="3" fill="#1D3557"/>
  <text x="608" y="462" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">COREQ (qualitative reporting)</text>
  <circle cx="426" cy="476" r="3" fill="#1D3557"/>
  <text x="436" y="480" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">Dissertation: 15,000–25,000 at MSc L7</text>
  <circle cx="598" cy="476" r="3" fill="#1D3557"/>
  <text x="608" y="480" font-family="Inter, Arial, sans-serif" font-size="10.5" fill="#2C2C2C">OTD: scholarly publication standard</text>
  <rect x="414" y="494" width="354" height="22" fill="#F4F9FA" rx="5"/>
  <text x="591" y="509" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#1D3557" text-anchor="middle" font-weight="600">Primary marking: Research methodology + critical synthesis · RCOT/WFOT/AOTA aligned</text>

  <!-- Bottom legend bar -->
  <rect x="0" y="538" width="800" height="48" fill="#1D3557" rx="0"/>
  <rect x="0" y="538" width="800" height="10" fill="#1D3557"/>
  <rect x="0" y="574" width="800" height="12" fill="#1D3557" rx="12"/>

  <!-- Legend items -->
  <rect x="32" y="551" width="12" height="12" fill="#2A9D8F" rx="2"/>
  <text x="50" y="562" font-family="Inter, Arial, sans-serif" font-size="10" fill="#FFFFFF">Teal border = BSc primary</text>
  <rect x="210" y="551" width="12" height="12" fill="#457B9D" rx="2"/>
  <text x="228" y="562" font-family="Inter, Arial, sans-serif" font-size="10" fill="#FFFFFF">Blue border = Placement / reflective</text>
  <rect x="420" y="551" width="12" height="12" fill="#1D3557" rx="2" stroke="#FFFFFF" stroke-width="1"/>
  <text x="438" y="562" font-family="Inter, Arial, sans-serif" font-size="10" fill="#FFFFFF">Navy border = Advanced / postgraduate</text>
  <text x="770" y="562" font-family="Inter, Arial, sans-serif" font-size="9" fill="#2A9D8F" text-anchor="end">ot-assignment-help.com</text>
</svg>
