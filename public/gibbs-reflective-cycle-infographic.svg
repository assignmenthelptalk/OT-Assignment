<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="gibbs-title gibbs-desc">
  <title id="gibbs-title">Gibbs Reflective Cycle — Applied to Occupational Therapy Placement Assignments</title>
  <desc id="gibbs-desc">Circular diagram showing the six stages of Gibbs Reflective Cycle: Description, Feelings, Evaluation, Analysis, Conclusion, and Action Plan, with question prompts for each stage. Designed for occupational therapy reflective essays and practice placement journals referencing HCPC Standards of Proficiency.</desc>

  <!-- Background -->
  <rect width="800" height="600" fill="#F4F9FA" rx="12"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#1D3557">Gibbs Reflective Cycle</text>
  <text x="400" y="66" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" fill="#457B9D">For Occupational Therapy Placement Assignments</text>

  <!-- Outer decorative ring -->
  <circle cx="400" cy="310" r="220" fill="none" stroke="#457B9D" stroke-width="2" stroke-dasharray="8 4" opacity="0.4"/>

  <!-- Centre circle -->
  <circle cx="400" cy="310" r="72" fill="#1D3557"/>
  <text x="400" y="302" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Gibbs</text>
  <text x="400" y="318" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#2A9D8F">Reflective</text>
  <text x="400" y="334" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Cycle</text>

  <!--
    Six stage positions (angles from top, clockwise):
    Stage 1 Description  — 270° (top)       cx=400, cy=90
    Stage 2 Feelings     — 330° (top-right)  cx=591, cy=200
    Stage 3 Evaluation   — 30°  (bot-right)  cx=591, cy=420
    Stage 4 Analysis     — 90°  (bottom)     cx=400, cy=530
    Stage 5 Conclusion   — 150° (bot-left)   cx=209, cy=420
    Stage 6 Action Plan  — 210° (top-left)   cx=209, cy=200
    r=220 from (400,310)
  -->

  <!-- Connector spokes (behind nodes) -->
  <!-- Stage 1 spoke -->
  <line x1="400" y1="238" x2="400" y2="130" stroke="#2A9D8F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stage 2 spoke -->
  <line x1="462" y1="272" x2="543" y2="223" stroke="#2A9D8F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stage 3 spoke -->
  <line x1="462" y1="348" x2="543" y2="397" stroke="#2A9D8F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stage 4 spoke -->
  <line x1="400" y1="382" x2="400" y2="490" stroke="#2A9D8F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stage 5 spoke -->
  <line x1="338" y1="348" x2="257" y2="397" stroke="#2A9D8F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stage 6 spoke -->
  <line x1="338" y1="272" x2="257" y2="223" stroke="#2A9D8F" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Curved arrows on the outer ring between nodes (clockwise) -->
  <!-- Arc 1→2: top to top-right -->
  <path d="M 430 95 A 220 220 0 0 1 575 192" fill="none" stroke="#1D3557" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <!-- Arc 2→3: top-right to bot-right -->
  <path d="M 602 238 A 220 220 0 0 1 602 382" fill="none" stroke="#1D3557" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <!-- Arc 3→4: bot-right to bottom -->
  <path d="M 575 428 A 220 220 0 0 1 430 525" fill="none" stroke="#1D3557" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <!-- Arc 4→5: bottom to bot-left -->
  <path d="M 370 525 A 220 220 0 0 1 225 428" fill="none" stroke="#1D3557" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <!-- Arc 5→6: bot-left to top-left -->
  <path d="M 198 382 A 220 220 0 0 1 198 238" fill="none" stroke="#1D3557" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <!-- Arc 6→1: top-left to top -->
  <path d="M 225 192 A 220 220 0 0 1 370 95" fill="none" stroke="#1D3557" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#1D3557"/>
    </marker>
  </defs>

  <!-- ===== STAGE 1 — Description (top) ===== -->
  <circle cx="400" cy="105" r="46" fill="#1D3557" stroke="#FFFFFF" stroke-width="3"/>
  <text x="400" y="96" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#2A9D8F">STAGE 1</text>
  <text x="400" y="110" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Description</text>
  <text x="400" y="123" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" fill="#F4F9FA">What happened?</text>

  <!-- ===== STAGE 2 — Feelings (top-right) cx≈591, cy≈200 ===== -->
  <circle cx="591" cy="200" r="46" fill="#2A9D8F" stroke="#FFFFFF" stroke-width="3"/>
  <text x="591" y="191" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#1D3557">STAGE 2</text>
  <text x="591" y="205" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Feelings</text>
  <text x="591" y="218" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">What were you</text>
  <text x="591" y="229" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">thinking/feeling?</text>

  <!-- ===== STAGE 3 — Evaluation (bottom-right) cx≈591, cy≈420 ===== -->
  <circle cx="591" cy="420" r="46" fill="#457B9D" stroke="#FFFFFF" stroke-width="3"/>
  <text x="591" y="411" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#F4F9FA">STAGE 3</text>
  <text x="591" y="425" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Evaluation</text>
  <text x="591" y="438" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">What was good</text>
  <text x="591" y="449" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">and bad?</text>

  <!-- ===== STAGE 4 — Analysis (bottom) cx=400, cy=515 ===== -->
  <circle cx="400" cy="515" r="50" fill="#1D3557" stroke="#2A9D8F" stroke-width="4"/>
  <text x="400" y="504" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#2A9D8F">STAGE 4 ★</text>
  <text x="400" y="518" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Analysis</text>
  <text x="400" y="531" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">What sense can you</text>
  <text x="400" y="542" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">make of it?</text>

  <!-- ===== STAGE 5 — Conclusion (bottom-left) cx≈209, cy≈420 ===== -->
  <circle cx="209" cy="420" r="46" fill="#457B9D" stroke="#FFFFFF" stroke-width="3"/>
  <text x="209" y="411" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#F4F9FA">STAGE 5</text>
  <text x="209" y="425" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Conclusion</text>
  <text x="209" y="438" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">What else could</text>
  <text x="209" y="449" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">you have done?</text>

  <!-- ===== STAGE 6 — Action Plan (top-left) cx≈209, cy≈200 ===== -->
  <circle cx="209" cy="200" r="46" fill="#2A9D8F" stroke="#FFFFFF" stroke-width="3"/>
  <text x="209" y="191" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#1D3557">STAGE 6</text>
  <text x="209" y="205" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Action Plan</text>
  <text x="209" y="218" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">If it arose again,</text>
  <text x="209" y="229" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8.5" fill="#F4F9FA">what would you do?</text>

  <!-- Key note: Stage 4 is the critical academic stage -->
  <rect x="262" y="555" width="276" height="28" rx="5" fill="#1D3557" opacity="0.08"/>
  <text x="400" y="573" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" fill="#1D3557">★ Stage 4 Analysis = 45–50% of total word count</text>

  <!-- Footer -->
  <text x="400" y="597" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" fill="#457B9D" opacity="0.8">ot-assignment-help.com</text>
</svg>
