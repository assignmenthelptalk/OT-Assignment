<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="100%" role="img" aria-labelledby="infographic-title">
  <title id="infographic-title">OT Case Study Assignment Structure — 6 Sequential Sections from Occupational Profile to Outcome Evaluation</title>

  <!-- Background -->
  <rect width="800" height="700" fill="#F4F9FA" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="64" fill="#1D3557" rx="8"/>
  <rect x="0" y="50" width="800" height="14" fill="#1D3557"/>
  <text x="400" y="38" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">OT Case Study Assignment Structure</text>

  <!-- ===== STEP 1 ===== -->
  <!-- Box -->
  <rect x="60" y="88" width="300" height="100" fill="#1D3557" rx="8"/>
  <!-- Step number circle -->
  <circle cx="88" cy="108" r="16" fill="#2A9D8F"/>
  <text x="88" y="114" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <!-- Title -->
  <text x="115" y="112" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Occupational Profile</text>
  <!-- Divider -->
  <line x1="80" y1="124" x2="348" y2="124" stroke="#2A9D8F" stroke-width="1.5" opacity="0.5"/>
  <!-- Tools line 1 -->
  <text x="80" y="142" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">COPM semi-structured interview</text>
  <!-- Tools line 2 -->
  <text x="80" y="158" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">5 priority occupational areas identified</text>
  <!-- Tools line 3 -->
  <text x="80" y="174" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">Importance &amp; performance rated 1–10</text>

  <!-- Arrow 1 → 2 (right) -->
  <polygon points="370,138 390,128 390,148" fill="#457B9D"/>
  <line x1="360" y1="138" x2="390" y2="138" stroke="#457B9D" stroke-width="2.5"/>

  <!-- ===== STEP 2 ===== -->
  <rect x="400" y="88" width="340" height="100" fill="#2A9D8F" rx="8"/>
  <circle cx="428" cy="108" r="16" fill="#1D3557"/>
  <text x="428" y="114" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="455" y="112" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Standardised Assessment</text>
  <line x1="420" y1="124" x2="728" y2="124" stroke="#1D3557" stroke-width="1.5" opacity="0.5"/>
  <text x="420" y="142" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">COPM / AMPS (logit scores) / MOHOST</text>
  <text x="420" y="158" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">FIM 18–126 · Barthel 0–100</text>
  <text x="420" y="174" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">Scores documented + interpreted</text>

  <!-- Arrow 2 → 3 (down-left, curved path indicator) -->
  <!-- Down arrow from step 2 to row 2 -->
  <line x1="570" y1="188" x2="570" y2="210" stroke="#457B9D" stroke-width="2.5"/>
  <polygon points="570,216 560,204 580,204" fill="#457B9D"/>

  <!-- Arrow 1 → row2 connector line -->
  <line x1="230" y1="188" x2="230" y2="210" stroke="#457B9D" stroke-width="2.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Connector line row 1 bottom to row 2 -->
  <line x1="230" y1="210" x2="570" y2="210" stroke="#457B9D" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- ===== STEP 3 ===== -->
  <rect x="400" y="228" width="340" height="108" fill="#1D3557" rx="8"/>
  <circle cx="428" cy="249" r="16" fill="#2A9D8F"/>
  <text x="428" y="255" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="455" y="253" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Clinical Reasoning</text>
  <line x1="420" y1="265" x2="728" y2="265" stroke="#2A9D8F" stroke-width="1.5" opacity="0.5"/>
  <text x="420" y="283" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">Procedural · Conditional · Narrative</text>
  <text x="420" y="299" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">Interactive · Pragmatic</text>
  <text x="420" y="315" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">Minimum 2 types named &amp; evidenced</text>
  <text x="420" y="331" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">Linked to assessment findings</text>

  <!-- Arrow 3 → 4 (left) -->
  <polygon points="390,282 370,272 370,292" fill="#457B9D"/>
  <line x1="370" y1="282" x2="400" y2="282" stroke="#457B9D" stroke-width="2.5"/>

  <!-- ===== STEP 4 ===== -->
  <rect x="60" y="228" width="300" height="108" fill="#2A9D8F" rx="8"/>
  <circle cx="88" cy="249" r="16" fill="#1D3557"/>
  <text x="88" y="255" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="115" y="253" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Goal Setting</text>
  <line x1="80" y1="265" x2="348" y2="265" stroke="#1D3557" stroke-width="1.5" opacity="0.5"/>
  <text x="80" y="283" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">SMART format: Specific · Measurable</text>
  <text x="80" y="299" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">Achievable · Relevant · Time-bound</text>
  <text x="80" y="315" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">Occupational performance goals only</text>
  <text x="80" y="331" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">Aligned to COPM priority areas</text>

  <!-- Arrow 4 → 5 (down) -->
  <line x1="210" y1="336" x2="210" y2="358" stroke="#457B9D" stroke-width="2.5"/>
  <polygon points="210,364 200,352 220,352" fill="#457B9D"/>

  <!-- ===== STEP 5 ===== -->
  <rect x="60" y="372" width="300" height="108" fill="#1D3557" rx="8"/>
  <circle cx="88" cy="393" r="16" fill="#2A9D8F"/>
  <text x="88" y="399" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="115" y="397" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Intervention Plan</text>
  <line x1="80" y1="409" x2="348" y2="409" stroke="#2A9D8F" stroke-width="1.5" opacity="0.5"/>
  <text x="80" y="427" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">Occupation-based · Compensatory</text>
  <text x="80" y="443" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">Remediation approach</text>
  <text x="80" y="459" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">Evidence: AJOT · BJOT · Cochrane</text>
  <text x="80" y="475" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A8D8D0">CIMT · Sensory Integration · ADL retraining</text>

  <!-- Arrow 5 → 6 (right) -->
  <polygon points="370,426 390,416 390,436" fill="#457B9D"/>
  <line x1="360" y1="426" x2="390" y2="426" stroke="#457B9D" stroke-width="2.5"/>

  <!-- ===== STEP 6 ===== -->
  <rect x="400" y="372" width="340" height="108" fill="#2A9D8F" rx="8"/>
  <circle cx="428" cy="393" r="16" fill="#1D3557"/>
  <text x="428" y="399" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="455" y="397" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Outcome Evaluation</text>
  <line x1="420" y1="409" x2="728" y2="409" stroke="#1D3557" stroke-width="1.5" opacity="0.5"/>
  <text x="420" y="427" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">Re-administer baseline tool (COPM/FIM)</text>
  <text x="420" y="443" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">Clinically meaningful change: ≥2-point</text>
  <text x="420" y="459" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">COPM improvement / AMPS logit gain</text>
  <text x="420" y="475" font-family="Inter, Arial, sans-serif" font-size="11" fill="#E8F5F3">Goal attainment documented</text>

  <!-- ===== THEORETICAL MODEL BAND ===== -->
  <rect x="60" y="504" width="680" height="64" fill="#457B9D" rx="8"/>
  <text x="400" y="526" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Theoretical Model Applied Across All Sections</text>
  <text x="400" y="548" font-family="Inter, Arial, sans-serif" font-size="11" fill="#D6E9F5" text-anchor="middle">MOHO (Volition · Habituation · Performance Capacity · Environment)  ·  CMOP-E (Person · Environment · Occupation · Spirituality)</text>

  <!-- ===== LEVEL BAND ===== -->
  <rect x="60" y="582" width="680" height="42" fill="#FFFFFF" rx="8" stroke="#D0E4EC" stroke-width="1.5"/>
  <text x="110" y="600" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#1D3557">Level 5 BSc</text>
  <text x="110" y="616" font-family="Inter, Arial, sans-serif" font-size="10" fill="#457B9D">2,000–3,000 words</text>
  <line x1="220" y1="590" x2="220" y2="618" stroke="#D0E4EC" stroke-width="1"/>
  <text x="268" y="600" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#1D3557">Level 6 BSc</text>
  <text x="268" y="616" font-family="Inter, Arial, sans-serif" font-size="10" fill="#457B9D">3,000–5,000 words</text>
  <line x1="378" y1="590" x2="378" y2="618" stroke="#D0E4EC" stroke-width="1"/>
  <text x="426" y="600" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#1D3557">Level 7 MSc/OTD</text>
  <text x="426" y="616" font-family="Inter, Arial, sans-serif" font-size="10" fill="#457B9D">4,000–6,000 words</text>
  <line x1="556" y1="590" x2="556" y2="618" stroke="#D0E4EC" stroke-width="1"/>
  <text x="580" y="600" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#1D3557">Referencing</text>
  <text x="580" y="616" font-family="Inter, Arial, sans-serif" font-size="10" fill="#457B9D">Harvard (UK) · APA 7 (INT)</text>

  <!-- Footer -->
  <text x="400" y="680" font-family="Inter, Arial, sans-serif" font-size="11" fill="#457B9D" text-anchor="middle" opacity="0.8">ot-assignment-help.com</text>
  <text x="400" y="694" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8BACC0" text-anchor="middle">Expert OT Assignment Help for BSc / MSc / OTD Students</text>
</svg>
